<svg width="400" height="220" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f5fa"/>
      <stop offset="100%" style="stop-color:#dce5ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg)"/>
  
  <!-- Message Bubbles -->
  <g filter="url(#shadow)">
    <!-- Left bubble -->
    <rect x="30" y="50" width="160" height="40" rx="20" fill="white" opacity="0.9"/>
    <rect x="35" y="55" width="80" height="6" rx="3" fill="#a0b8d4" opacity="0.6"/>
    <rect x="35" y="66" width="100" height="6" rx="3" fill="#a0b8d4" opacity="0.4"/>
    
    <!-- Right bubble -->
    <rect x="210" y="100" width="150" height="40" rx="20" fill="#7da6d1" opacity="0.25"/>
    <rect x="215" y="105" width="90" height="6" rx="3" fill="#5c8ab8" opacity="0.6"/>
    <rect x="215" y="116" width="70" height="6" rx="3" fill="#5c8ab8" opacity="0.4"/>
    
    <!-- Left bubble -->
    <rect x="30" y="150" width="140" height="40" rx="20" fill="white" opacity="0.9"/>
    <rect x="35" y="155" width="60" height="6" rx="3" fill="#a0b8d4" opacity="0.6"/>
    <rect x="35" y="166" width="85" height="6" rx="3" fill="#a0b8d4" opacity="0.4"/>
  </g>
  
  <!-- Checkboxes -->
  <g fill="#5c8ab8" opacity="0.7">
    <circle cx="190" cy="70" r="8" fill="none" stroke="#5c8ab8" stroke-width="2"/>
    <circle cx="365" cy="120" r="8" fill="#5c8ab8"/>
    <path d="M361 120 l2.5 2.5 l5 -5" stroke="white" stroke-width="1.5" fill="none"/>
    <circle cx="170" cy="170" r="8" fill="#5c8ab8"/>
    <path d="M166 170 l2.5 2.5 l5 -5" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Export Icon -->
  <g transform="translate(330, 30)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="white" opacity="0.8" filter="url(#shadow)"/>
    <path d="M12 10 L18 16 L12 22 M18 10 L24 16 L18 22" stroke="#5c8ab8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="scale(0.8) translate(4.5, 4.5)"/>
  </g>
</svg>