<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>禅石排布</title>
  <style>
    :root {
      --bg: #f3ecde;
      --sand: #efe5d4;
      --ink: #2c2925;
      --muted: rgba(44,41,37,.66);
      --line: rgba(44,41,37,.12);
      --accent: #b78152;
      --panel: rgba(255,255,255,.58);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Noto Serif SC", "Songti SC", serif; background: var(--bg); color: var(--ink); }
    body { overflow: hidden; }
    canvas { position: fixed; inset: 0; }
    .ui {
      position: relative; z-index: 2; min-height: 100%; display: grid; grid-template-rows: auto 1fr; padding: 22px;
    }
    .top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; flex-wrap: wrap;
    }
    .title {
      max-width: 560px; padding: 18px 20px; border: 1px solid rgba(44,41,37,.08); background: var(--panel); border-radius: 24px; backdrop-filter: blur(8px);
    }
    .title h1 { margin: 0; font-size: 28px; letter-spacing: .08em; }
    .title p { margin: 10px 0 0; line-height: 1.8; color: var(--muted); }
    .controls {
      display: grid; gap: 12px; min-width: min(360px, 100%);
      padding: 16px; border-radius: 24px; background: var(--panel); border: 1px solid rgba(44,41,37,.08);
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid rgba(44,41,37,.1); background: rgba(255,255,255,.72); color: var(--ink); padding: 10px 14px; border-radius: 999px; cursor: pointer;
    }
    button:hover { background: white; }
    .tip { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .badge { color: var(--accent); }
    @media (max-width: 760px) {
      .ui { padding: 14px; }
      .title h1 { font-size: 24px; }
      .controls { min-width: 100%; }
    }
  </style>
</head>
<body>
  <canvas id="sand"></canvas>
  <div class="ui">
    <div class="top">
      <div class="title">
        <h1>禅石排布</h1>
        <p>在一片电子白砂上，拖动石头，耙出纹路。它像游戏，又像一张会呼吸的海报。</p>
      </div>
      <div class="controls">
        <div class="row">
          <a href="../index.html" style="display:inline-flex;align-items:center;border:1px solid rgba(44,41,37,.1);background:rgba(255,255,255,.72);color:#2c2925;padding:10px 14px;border-radius:999px;cursor:pointer;text-decoration:none;">← 返回展厅</a>
          <button id="shuffleBtn">换一组石头</button>
          <button id="rakeBtn">自动耙纹</button>
          <button id="calmBtn">归于平静</button>
        </div>
        <div class="tip">
          <span class="badge">玩法：</span>拖拽石头改变构图；双击空白处落下一颗小石；自动生成的线条会围绕石头流动。
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('sand');
    const ctx = canvas.getContext('2d');
    const stones = [];
    let dragged = null;
    let hoverX = 0, hoverY = 0;
    let ripple = 0;

    function resize() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      seedLayout();
    }

    function seedLayout() {
      stones.length = 0;
      const count = innerWidth < 640 ? 4 : 6;
      for (let i = 0; i < count; i++) {
        stones.push({
          x: innerWidth * (0.18 + Math.random() * 0.64),
          y: innerHeight * (0.28 + Math.random() * 0.54),
          r: 28 + Math.random() * 42,
          stretch: 0.6 + Math.random() * 0.7,
          rot: Math.random() * Math.PI,
          shade: 28 + Math.random() * 22
        });
      }
    }

    function drawBackground() {
      ctx.fillStyle = '#f3ecde';
      ctx.fillRect(0, 0, innerWidth, innerHeight);
      ctx.fillStyle = 'rgba(0,0,0,.018)';
      for (let i = 0; i < 1400; i++) {
        ctx.fillRect(Math.random() * innerWidth, Math.random() * innerHeight, 1, 1);
      }
    }

    function drawRakeLines(t) {
      ctx.lineWidth = 1;
      for (let y = 80; y < innerHeight - 40; y += 18) {
        ctx.beginPath();
        for (let x = 0; x <= innerWidth; x += 8) {
          let offset = Math.sin(x * 0.008 + t * 0.001 + y * 0.01) * 3;
          stones.forEach(s => {
            const dx = x - s.x;
            const dy = y - s.y;
            const d = Math.hypot(dx, dy);
            const influence = Math.max(0, 1 - d / (s.r * 3.6));
            offset += Math.sin(d * 0.05 - t * 0.003) * influence * 18;
          });
          if (x === 0) ctx.moveTo(x, y + offset);
          else ctx.lineTo(x, y + offset);
        }
        ctx.strokeStyle = 'rgba(44,41,37,.1)';
        ctx.stroke();
      }
    }

    function drawStone(s) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      const g = ctx.createRadialGradient(-s.r * 0.35, -s.r * 0.4, 8, 0, 0, s.r * 1.4);
      g.addColorStop(0, `hsl(0 0% ${s.shade + 14}% / .96)`);
      g.addColorStop(1, `hsl(0 0% ${s.shade}% / 1)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, s.r * s.stretch, s.r, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.08)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.restore();
    }

    function drawHover() {
      if (!hoverX && !hoverY) return;
      ctx.strokeStyle = 'rgba(183,129,82,.18)';
      ctx.beginPath();
      ctx.arc(hoverX, hoverY, 34 + Math.sin(ripple) * 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    function render(t) {
      drawBackground();
      drawRakeLines(t);
      stones.forEach(drawStone);
      drawHover();
      ripple += 0.04;
      requestAnimationFrame(render);
    }

    function pointerPos(e) {
      return { x: e.clientX, y: e.clientY };
    }

    canvas.addEventListener('pointerdown', e => {
      const p = pointerPos(e);
      hoverX = p.x; hoverY = p.y;
      for (let i = stones.length - 1; i >= 0; i--) {
        const s = stones[i];
        if (Math.hypot(p.x - s.x, p.y - s.y) < s.r * 1.1) {
          dragged = { stone: s, dx: p.x - s.x, dy: p.y - s.y };
          break;
        }
      }
    });

    canvas.addEventListener('pointermove', e => {
      const p = pointerPos(e);
      hoverX = p.x; hoverY = p.y;
      if (dragged) {
        dragged.stone.x = p.x - dragged.dx;
        dragged.stone.y = p.y - dragged.dy;
      }
    });

    addEventListener('pointerup', () => dragged = null);

    canvas.addEventListener('dblclick', e => {
      const p = pointerPos(e);
      stones.push({ x: p.x, y: p.y, r: 16 + Math.random() * 16, stretch: 0.7 + Math.random() * 0.4, rot: Math.random() * Math.PI, shade: 26 + Math.random() * 16 });
    });

    document.getElementById('shuffleBtn').onclick = seedLayout;
    document.getElementById('rakeBtn').onclick = () => { stones.forEach(s => s.rot += (Math.random() - .5) * 0.8); };
    document.getElementById('calmBtn').onclick = () => { stones.splice(0, stones.length); seedLayout(); };

    addEventListener('resize', resize);
    resize();
    requestAnimationFrame(render);
  </script>
</body>
</html>
