<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bing' Works</title>
  <meta
    name="description"
    content="Bing' Works：Bing 与阿罗德斯的作品目录，以更克制的方式展示工具、互动实验、知识可视化与数字氛围项目。"
  />
  <meta name="theme-color" content="#f3f4f6" />
  <meta property="og:title" content="Bing' Works" />
  <meta property="og:description" content="一个克制、清晰、可直接访问的作品目录。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar reveal">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <span>Bing' Works</span>
      </div>
      <div class="topbar-actions">
        <button class="view-toggle" id="viewToggle" type="button" aria-label="切换视图">
          <svg class="view-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换主题">
          <span class="theme-icon" id="themeIcon">☼</span>
        </button>
      </div>
    </header>

    <section class="section reveal delay-2" id="works">
      <div class="filters" aria-label="作品筛选"></div>

      <div class="catalog" id="catalog"></div>
    </section>

  </div>

  <script src="./js/main.js"></script>
</body>
</html>
